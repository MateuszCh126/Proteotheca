name: keep-warm

# Poke the Render backend so it doesn't cold-start (free tier sleeps after ~15 min idle).
# GitHub's scheduler can be delayed under load, so this is best-effort: it never fails the
# run, it just logs the HTTP status. Trigger manually from the Actions tab any time.
on:
  schedule:
    - cron: "*/10 * * * *"   # every 10 minutes
  workflow_dispatch: {}

concurrency:
  group: keep-warm
  cancel-in-progress: true

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend
        run: |
          URL="https://proteotheca.onrender.com/"
          for i in 1 2 3; do
            code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 70 "$URL") || code=000
            echo "attempt $i -> HTTP $code"
            if [ "$code" = "200" ]; then
              echo "backend is warm"
              exit 0
            fi
            sleep 20
          done
          echo "::warning::backend did not return 200 (may be waking or down)"
