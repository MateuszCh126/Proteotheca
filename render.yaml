# Render Blueprint for the Proteotheca (BioMed Explorer) FastAPI backend.
# Deploy: push this repo, then in Render → "New +" → "Blueprint" → pick this repo.
services:
  - type: web
    name: proteotheca-api
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.7"
      - key: MOCK_MODE
        value: "false"
      # Comma-separated list of allowed frontend origins (your Vercel domain).
      - key: CORS_ALLOWED_ORIGINS
        value: "https://proteotheca.vercel.app"
      - key: JWT_SECRET
        generateValue: true
